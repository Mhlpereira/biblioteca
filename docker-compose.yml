
name: biblioteca-stack

networks:
  public:
    driver: bridge
  internal:
    driver: bridge
    internal: true

volumes:
  postgres_konga_data:
  keycloak_db_data:
  es_data:
  kafka_data:
  zookeeper_data:

services:
  frontend:
    build:
      context: ./frontend
    container_name: frontend
    environment:
      KONG_BASE_URL: "http://kong:8000"
      KEYCLOAK_ISSUER: "http://keycloak:8080/realms/am"
      KEYCLOAK_CLIENT_ID: "frontend"
    ports:
      - "8080:80"   
    depends_on:
      - kong
    networks:
      - public
      - internal

  kong:
    image: kong:3.6
    container_name: kong
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: "/kong/declarative/kong.yml"
      KONG_PROXY_LISTEN: "0.0.0.0:8000"
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
      # Logs em stdout
      KONG_LOG_LEVEL: "info"
    volumes:
      - ./kong/kong.yml:/kong/declarative/kong.yml:ro
    depends_on:
      - backend
      - keycloak
    networks:
      - internal


  konga-db:
    image: postgres:16
    container_name: konga-db
    environment:
      POSTGRES_DB: konga
      POSTGRES_USER: konga
      POSTGRES_PASSWORD: konga_pass
    volumes:
      - postgres_konga_data:/var/lib/postgresql/data
    networks:
      - internal

  konga:
    image: pantsel/konga:latest
    container_name: konga
    environment:
      DB_ADAPTER: "postgres"
      DB_HOST: "konga-db"
      DB_PORT: "5432"
      DB_USER: "konga"
      DB_PASSWORD: "konga_pass"
      DB_DATABASE: "konga"
      NODE_ENV: "production"
    depends_on:
      - kong
      - konga-db
    networks:
      - internal

  keycloak-db:
    image: postgres:16
    container_name: keycloak-db
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak_pass
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data
    networks:
      - internal

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: keycloak
    command: ["start-dev"]
    environment:
      KC_DB: postgres
      KC_DB_URL: "jdbc:postgresql://keycloak-db:5432/keycloak"
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak_pass
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_PROXY_HEADERS: "xforwarded"
    depends_on:
      - keycloak-db
    networks:
      - internal

  backend:
    build:
      context: ./backend
    container_name: backend
    environment:
      # exemplo
      NODE_ENV: production
      ELASTIC_URL: "http://elasticsearch:9200"
      KAFKA_BROKERS: "kafka:9092"
      KEYCLOAK_ISSUER: "http://keycloak:8080/realms/am"
    depends_on:
      - kafka
      - elasticsearch
    networks:
      - internal

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - internal


  logstash:
    image: docker.elastic.co/logstash/logstash:8.13.4
    container_name: logstash
    environment:
      - xpack.monitoring.enabled=false
      - LS_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline:ro
    depends_on:
      - kafka
      - elasticsearch
    networks:
      - internal

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_data:/var/lib/zookeeper/log
    networks:
      - internal

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: "zookeeper:2181"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - internal
    # Sem ports
