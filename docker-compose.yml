name: biblioteca-stack

networks:
  public:
    driver: bridge
  internal:
    driver: bridge
    internal: true

volumes:
  postgres_konga_data:
  keycloak_db_data:
  es_data:
  kafka_data:
  zookeeper_data:
  zookeeper_log:
  kong_db_data:
  mysql_data:

services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "8080:80"
    depends_on:
      kong:
        condition: service_started
    networks:
      - public
      - internal

  kong-db:
    image: postgres:16
    environment:
      POSTGRES_DB: kong
      POSTGRES_USER: kong
      POSTGRES_PASSWORD: kong_pass
    volumes:
      - kong_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kong -d kong"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - internal

  kong-migrations:
    image: kong:3.6
    command: ["kong", "migrations", "bootstrap"]
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-db
      KONG_PG_DATABASE: kong
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: kong_pass
    depends_on:
      kong-db:
        condition: service_healthy
    networks:
      - internal

  kong:
    build:
      context: ./kong
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-db
      KONG_PG_DATABASE: kong
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: kong_pass
      KONG_PLUGINS: "bundled"
      KONG_PROXY_LISTEN: "0.0.0.0:8000"
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
      KONG_LOG_LEVEL: "info"
    depends_on:
      kong-db:
        condition: service_healthy
      kong-migrations:
        condition: service_completed_successfully
      backend:
        condition: service_started
      keycloak:
        condition: service_healthy
    ports:
      - "8000:8000"
      - "8001:8001"
    networks:
      - internal
      - public

  # KONGA 
  konga-db:
    image: postgres:11
    environment:
      POSTGRES_DB: konga
      POSTGRES_USER: konga
      POSTGRES_PASSWORD: konga_pass
    volumes:
      - postgres_konga_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U konga -d konga"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - internal

  konga-prepare:
    image: pantsel/konga:latest
    depends_on:
      konga-db:
        condition: service_healthy
    environment:
      NODE_ENV: "production"
      TOKEN_SECRET: "uma-chave-bem-grande-aqui"
    entrypoint: ["node", "/app/bin/konga.js"]
    command: ["prepare", "--adapter", "postgres", "--uri", "postgresql://konga:konga_pass@konga-db:5432/konga"]
    networks:
      - internal
    restart: "no"

  konga:
    image: pantsel/konga:latest
    depends_on:
      konga-db:
        condition: service_healthy
      konga-prepare:
        condition: service_completed_successfully
      kong:
        condition: service_started
    environment:
      DB_ADAPTER: "postgres"
      DB_HOST: "konga-db"
      DB_PORT: "5432"
      DB_USER: "konga"
      DB_PASSWORD: "konga_pass"
      DB_DATABASE: "konga"
      NODE_ENV: "production"
      TOKEN_SECRET: "uma-chave-bem-grande-aqui"
    ports:
      - "1337:1337"
    networks:
      - internal
      - public

  # KEYCLOAK
  keycloak-db:
    image: postgres:16
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak_pass
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak -h 127.0.0.1 -p 5432"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - internal

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    command: ["start-dev"]
    environment:
      KC_DB: postgres
      KC_DB_URL: "jdbc:postgresql://keycloak-db:5432/keycloak"
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak_pass
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_PROXY_HEADERS: "xforwarded"
      KC_HOSTNAME_URL: "http://localhost:8081"
      KC_HOSTNAME_ADMIN_URL: "http://localhost:8081"
    depends_on:
      keycloak-db:
        condition: service_healthy
    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - internal
      - public

  # BACKEND
  backend:
    build:
      context: ./backend
    environment:
      NODE_ENV: production
      ELASTIC_URL: "http://elasticsearch:9200"
      KAFKA_BROKERS: "kafka:9092"

      DATABASE_HOST: "mysql"
      DATABASE_PORT: "3306"
      DATABASE_USER: "user"
      DATABASE_PASSWORD: "password"
      DATABASE_NAME: "biblioteca"

      KEYCLOAK_BASE_URL: "http://keycloak:8080"
      KEYCLOAK_REALM: "biblioteca"
      KEYCLOAK_ISSUER: "http://localhost:8081/realms/biblioteca"
      KEYCLOAK_JWKS_URI: "http://keycloak:8080/realms/biblioteca/protocol/openid-connect/certs"
      KEYCLOAK_CLIENT_ID: "frontend"

      KC_ADMIN_CLIENT_ID: "backend"
      KC_ADMIN_CLIENT_SECRET: "SCs6rOvZ9eI2x93771bAdj62nNiH3TrW"
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_started
      elasticsearch:
        condition: service_started
      keycloak:
        condition: service_healthy
    expose:
      - "3000"
    networks:
      - internal

  # MYSQL
  mysql:
    image: mysql:8.0
    container_name: biblioteca-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: biblioteca
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - internal
      - public
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -proot --silent"]
      interval: 10s
      timeout: 5s
      retries: 20

  # ELASTIC / LOGSTASH
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms1g -Xmx1g"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    expose:
      - "9200"
    networks:
      - internal

  logstash:
    image: docker.elastic.co/logstash/logstash:8.13.4
    environment:
      xpack.monitoring.enabled: "false"
      LS_JAVA_OPTS: "-Xms512m -Xmx512m"
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline:ro
    depends_on:
      kafka:
        condition: service_started
      elasticsearch:
        condition: service_started
    networks:
      - internal

  # KAFKA / ZOOKEEPER
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: "2181"
      ZOOKEEPER_TICK_TIME: "2000"
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
    networks:
      - internal

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      zookeeper:
        condition: service_started
    environment:
      KAFKA_BROKER_ID: "1"
      KAFKA_ZOOKEEPER_CONNECT: "zookeeper:2181"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - internal