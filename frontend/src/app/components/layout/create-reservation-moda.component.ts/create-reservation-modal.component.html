<div class="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm p-4">
    <div class="bg-white rounded-xl shadow-2xl w-full max-w-md overflow-hidden animate-scale-in">
        <div class="bg-blue-600 px-6 py-4 flex justify-between items-center">
            <h3 class="text-white font-bold text-lg">Nova Reserva</h3>
            <button (click)="close.emit()" class="text-white/80 hover:text-white">✕</button>
        </div>

        <div class="p-6">
            <div class="mb-6 flex gap-4 bg-slate-50 p-3 rounded-lg border border-slate-100">
                <img
                    [src]="book.imageUrl || 'https://placehold.co/50x75'"
                    class="w-12 h-16 object-cover rounded shadow-sm"
                />
                <div>
                    <h4 class="font-bold text-slate-800 text-sm">{{ book.title }}</h4>
                    <p class="text-xs text-slate-500">{{ book.author }}</p>
                </div>
            </div>

            <form [formGroup]="form" (ngSubmit)="submit()">
                <div class="mb-4">
                    <label class="block text-sm font-medium text-slate-700 mb-1">ID do Cliente</label>
                    <input
                        type="text"
                        formControlName="clientId"
                        placeholder="Digite o ID ou CPF do cliente"
                        class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition-all"
                    />
                    @if (form.get("clientId")?.invalid && form.get("clientId")?.touched) {
                        <p class="text-red-500 text-xs mt-1">O ID do cliente é obrigatório.</p>
                    }
                </div>

                <div class="mb-6">
                    <label class="block text-sm font-medium text-slate-700 mb-1">Data de Devolução</label>
                    <input
                        type="date"
                        formControlName="dueDate"
                        class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition-all"
                    />
                    <p class="text-xs text-slate-400 mt-1">Padrão: 7 dias a partir de hoje.</p>
                </div>

                <div class="flex gap-3 justify-end">
                    <button
                        type="button"
                        (click)="close.emit()"
                        class="px-4 py-2 text-slate-600 hover:bg-slate-100 rounded-lg font-medium transition-colors"
                    >
                        Cancelar
                    </button>
                    <button
                        type="submit"
                        [disabled]="form.invalid"
                        class="px-4 py-2 bg-blue-600 text-white rounded-lg font-bold hover:bg-blue-700 transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
                    >
                        Confirmar Reserva
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
