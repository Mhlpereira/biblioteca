<div class="flex h-screen bg-gray-100 overflow-hidden">
    <aside class="w-64 bg-slate-900 text-white flex flex-col shadow-xl z-20 hidden md:flex">
        <div class="h-16 flex items-center justify-center border-b border-slate-800 font-bold text-xl tracking-wider">
            Biblio<span class="text-blue-500">teca</span>
        </div>

        <nav class="flex-1 px-4 py-6 space-y-2">
            <a
                routerLink="/dashboard"
                routerLinkActive="bg-blue-600 text-white"
                class="flex items-center px-4 py-3 text-gray-300 rounded-lg hover:bg-slate-800 hover:text-white transition-colors cursor-pointer group"
            >
                <svg class="w-5 h-5 mr-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        stroke-width="2"
                        d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 001 1h3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"
                    />
                </svg>
                Início
            </a>

            @if (userStore.isAdmin()) {
                <div class="pt-4 pb-2">
                    <p class="px-4 text-xs font-semibold text-slate-500 uppercase tracking-wider">Administração</p>
                </div>

                <a
                    routerLink="/admin/livros"
                    routerLinkActive="bg-blue-600 text-white"
                    class="flex items-center px-4 py-3 text-gray-300 rounded-lg hover:bg-slate-800 hover:text-white transition-colors cursor-pointer"
                >
                    <svg class="w-5 h-5 mr-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            stroke-width="2"
                            d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"
                        />
                    </svg>
                    Livros
                </a>

                <a
                    routerLink="/admin/clientes"
                    routerLinkActive="bg-blue-600 text-white"
                    class="flex items-center px-4 py-3 text-gray-300 rounded-lg hover:bg-slate-800 hover:text-white transition-colors cursor-pointer"
                >
                    <svg class="w-5 h-5 mr-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            stroke-width="2"
                            d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"
                        />
                    </svg>
                    Clientes
                </a>
            }
        </nav>

        <div class="p-4 border-t border-slate-800">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-blue-500 flex items-center justify-center text-white font-bold">
                    {{ userStore.user()?.name?.charAt(0) }}
                </div>
                <div class="flex-1 min-w-0">
                    <p class="text-sm font-medium text-white truncate">{{ userStore.user()?.name }}</p>
                    <p class="text-xs text-gray-400 truncate">Sair</p>
                </div>
                <button (click)="logout()" class="text-gray-400 hover:text-white">
                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            stroke-width="2"
                            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"
                        />
                    </svg>
                </button>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden relative">
        <header class="bg-white shadow-sm h-16 flex items-center justify-between px-4 md:hidden z-10">
            <span class="font-bold text-lg text-slate-800">LibrarySys</span>
            <button class="text-gray-600 focus:outline-none">
                <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" />
                </svg>
            </button>
        </header>

        <div class="flex-1 overflow-x-hidden overflow-y-auto bg-slate-100 p-6">
            <router-outlet></router-outlet>
        </div>
    </main>
</div>
