<div class="flex h-screen bg-slate-50">
    <aside class="w-64 bg-slate-900 text-white flex flex-col">
        <div class="h-16 flex items-center px-6 border-b border-slate-800 font-bold text-xl tracking-wider">
            LIB<span class="text-blue-500">SYS</span>
        </div>

        <div class="flex-1 overflow-y-auto py-4 px-3 space-y-1">
            <p class="px-3 text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2 mt-2">Menu</p>

            <a
                routerLink="/dashboard"
                routerLinkActive="bg-slate-800 text-white"
                class="flex items-center px-3 py-2 text-sm font-medium text-slate-300 rounded-md hover:bg-slate-800 hover:text-white group transition-colors"
            >
                <svg
                    class="mr-3 h-5 w-5 text-slate-400 group-hover:text-white"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke="currentColor"
                >
                    <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        stroke-width="2"
                        d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"
                    />
                </svg>
                Dashboard
            </a>

            <a
                routerLink="/catalog"
                routerLinkActive="bg-slate-800 text-white"
                class="flex items-center px-3 py-2 text-sm font-medium text-slate-300 rounded-md hover:bg-slate-800 hover:text-white group transition-colors"
            >
                <svg class="mr-3 h-5 w-5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        stroke-width="2"
                        d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"
                    />
                </svg>
                Catálogo
            </a>

            @if (userStore.isAdmin()) {
                <div class="pt-4 mt-4 border-t border-slate-800">
                    <p class="px-3 text-xs font-semibold text-blue-500 uppercase tracking-wider mb-2">Administração</p>

                    <a
                        routerLink="/admin/dashboard"
                        routerLinkActive="bg-slate-800 text-white"
                        class="flex items-center px-3 py-2 text-sm font-medium text-slate-300 rounded-md hover:bg-slate-800 hover:text-white group"
                    >
                        <svg class="mr-3 h-5 w-5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                stroke-width="2"
                                d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"
                            />
                        </svg>
                        Visão Geral
                    </a>

                    <a
                        routerLink="/admin/books"
                        routerLinkActive="bg-slate-800 text-white"
                        class="flex items-center px-3 py-2 text-sm font-medium text-slate-300 rounded-md hover:bg-slate-800 hover:text-white group"
                    >
                        <svg class="mr-3 h-5 w-5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                stroke-width="2"
                                d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"
                            />
                        </svg>
                        Gerenciar Livros
                    </a>

                    <a
                        routerLink="/admin/users"
                        routerLinkActive="bg-slate-800 text-white"
                        class="flex items-center px-3 py-2 text-sm font-medium text-slate-300 rounded-md hover:bg-slate-800 hover:text-white group"
                    >
                        <svg class="mr-3 h-5 w-5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                stroke-width="2"
                                d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"
                            />
                        </svg>
                        Gerenciar Usuários
                    </a>
                </div>
            }
        </div>

        <div class="border-t border-slate-800 p-4">
            <div class="flex items-center">
                <div class="ml-3">
                    <p class="text-sm font-medium text-white">{{ userStore.user()?.name }}</p>
                    <a routerLink="/settings" class="text-xs text-slate-400 hover:text-white">Configurações</a>
                    <span class="text-slate-600 mx-1">|</span>
                    <button (click)="logout()" class="text-xs text-red-400 hover:text-red-300">Sair</button>
                </div>
            </div>
        </div>
    </aside>

    <main class="flex-1 overflow-auto p-8">
        <router-outlet></router-outlet>
    </main>
</div>
