<div class="overflow-x-auto min-h-[400px]">
    <table class="min-w-full divide-y divide-slate-200">
        <thead class="bg-slate-50">
            <tr>
                <th class="px-6 py-3 text-left text-xs font-bold text-slate-500 uppercase tracking-wider">Título</th>
                <th class="px-6 py-3 text-left text-xs font-bold text-slate-500 uppercase tracking-wider">Autor</th>
                <th class="px-6 py-3 text-center text-xs font-bold text-slate-500 uppercase tracking-wider">Cópias</th>
                <th class="px-6 py-3 text-center text-xs font-bold text-slate-500 uppercase tracking-wider">Status</th>
                <th class="px-6 py-3 text-right text-xs font-bold text-slate-500 uppercase tracking-wider">Ações</th>
            </tr>
        </thead>
        <tbody class="bg-white divide-y divide-slate-200">
            @for (book of books; track book.id) {
                <tr class="hover:bg-slate-50 transition-colors">
                    <td class="px-6 py-4 whitespace-nowrap">
                        <div class="text-sm font-bold text-slate-800">{{ book.title }}</div>
                    </td>

                    <td class="px-6 py-4 whitespace-nowrap">
                        <div class="text-sm text-slate-600">{{ book.author }}</div>
                    </td>

                    <td class="px-6 py-4 whitespace-nowrap text-center">
                        <span
                            class="inline-flex items-center px-2.5 py-0.5 rounded-md text-sm font-medium bg-blue-50 text-blue-700"
                        >
                            {{ book.availableCopies }} / {{ book.totalCopies }}
                        </span>
                    </td>

                    <td class="px-6 py-4 whitespace-nowrap text-center">
                        @if (book.availableCopies > 0) {
                            <span
                                class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-bold bg-green-100 text-green-700"
                            >
                                <span class="w-1.5 h-1.5 rounded-full bg-green-500"></span>
                                Disponível
                            </span>
                        } @else {
                            <span
                                class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-bold bg-red-100 text-red-700"
                            >
                                <span class="w-1.5 h-1.5 rounded-full bg-red-500"></span>
                                Esgotado
                            </span>
                        }
                    </td>

                    <td class="px-6 py-4 whitespace-nowrap text-right relative">
                        <button
                            (click)="toggleMenu(book.id)"
                            class="text-slate-400 hover:text-slate-600 p-1 rounded-full hover:bg-slate-100 transition-all focus:outline-none"
                        >
                            <svg
                                xmlns="http://www.w3.org/2000/svg"
                                class="h-5 w-5"
                                viewBox="0 0 20 20"
                                fill="currentColor"
                            >
                                <path
                                    d="M10 6a2 2 0 110-4 2 2 0 010 4zM10 12a2 2 0 110-4 2 2 0 010 4zM10 18a2 2 0 110-4 2 2 0 010 4z"
                                />
                            </svg>
                        </button>

                        @if (activeMenuId() === book.id) {
                            <div
                                class="absolute right-8 top-8 w-48 bg-white rounded-lg shadow-xl border border-slate-100 z-50 animate-fade-in origin-top-right"
                            >
                                <div class="py-1" role="menu">
                                    <button
                                        (click)="handleAction('add', book.id)"
                                        class="w-full text-left px-4 py-2 text-sm text-slate-700 hover:bg-slate-50 hover:text-blue-600 flex items-center gap-2"
                                    >
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path
                                                stroke-linecap="round"
                                                stroke-linejoin="round"
                                                stroke-width="2"
                                                d="M12 6v6m0 0v6m0-6h6m-6 0H6"
                                            ></path>
                                        </svg>
                                        Adicionar Cópia
                                    </button>

                                    <button
                                        (click)="handleAction('remove', book.id)"
                                        class="w-full text-left px-4 py-2 text-sm text-slate-700 hover:bg-slate-50 hover:text-amber-600 flex items-center gap-2"
                                    >
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path
                                                stroke-linecap="round"
                                                stroke-linejoin="round"
                                                stroke-width="2"
                                                d="M20 12H4"
                                            ></path>
                                        </svg>
                                        Remover Cópia
                                    </button>

                                    <div class="border-t border-slate-100 my-1"></div>

                                    <button
                                        (click)="handleAction('delete', book.id)"
                                        class="w-full text-left px-4 py-2 text-sm text-red-600 hover:bg-red-50 flex items-center gap-2"
                                    >
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path
                                                stroke-linecap="round"
                                                stroke-linejoin="round"
                                                stroke-width="2"
                                                d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"
                                            ></path>
                                        </svg>
                                        Excluir Livro
                                    </button>
                                </div>
                            </div>

                            <div
                                (click)="activeMenuId.set(null)"
                                class="fixed inset-0 z-40 bg-transparent cursor-default"
                            ></div>
                        }
                    </td>
                </tr>
            }
        </tbody>
    </table>
</div>
