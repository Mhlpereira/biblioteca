<div class="overflow-x-auto min-h-[400px]">
    <table class="min-w-full divide-y divide-slate-200">
        <thead class="bg-slate-50">
            <tr>
                <th class="px-6 py-3 text-left text-xs font-bold text-slate-500 uppercase tracking-wider">Título</th>
                <th class="px-6 py-3 text-left text-xs font-bold text-slate-500 uppercase tracking-wider">Autor</th>
                <th class="px-6 py-3 text-right text-xs font-bold text-slate-500 uppercase tracking-wider">Ações</th>
            </tr>
        </thead>
        <tbody class="bg-white divide-y divide-slate-200">
            @for (book of books; track book.id) {
                <tr class="hover:bg-slate-50 transition-colors">
                    <td class="px-6 py-4 whitespace-nowrap text-sm font-bold text-slate-800">
                        {{ book.title }}
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-600">
                        {{ book.author }}
                    </td>

                    <td class="px-6 py-4 whitespace-nowrap text-right relative">
                        <button
                            (click)="toggleMenu(book.id)"
                            class="text-slate-400 hover:text-slate-600 p-1 rounded-full hover:bg-slate-100 focus:outline-none"
                        >
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                <path d="M10 6a2 2 0 110-4 2 2 0 010 4zM10 12a2 2 0 110-4 2 2 0 010 4zM10 18a2 2 0 110-4 2 2 0 010 4z" />
                            </svg>
                        </button>

                        @if (activeMenuId() === book.id) {
                            <div class="absolute right-8 top-8 w-48 bg-white rounded-lg shadow-xl border border-slate-100 z-50 animate-fade-in origin-top-right">
                                <div class="py-1" role="menu">
                                    
                                    <button (click)="onSettingsClick(book)" class="w-full text-left px-4 py-2 text-sm text-slate-700 hover:bg-slate-50 hover:text-blue-600 flex items-center gap-2 border-b border-slate-50">
                                        <span>Gerenciar Estoque</span>
                                    </button>

                                    <button (click)="onEditClick(book)" class="w-full text-left px-4 py-2 text-sm text-slate-700 hover:bg-slate-50 hover:text-blue-600 flex items-center gap-2">
                                        <span>Editar Dados</span>
                                    </button>

                                    <button (click)="handleAction('add', book.id)" class="w-full text-left px-4 py-2 text-sm text-slate-700 hover:bg-slate-50 hover:text-green-600 flex items-center gap-2">
                                        <span>+1 Cópia Rápida</span>
                                    </button>

                                    <div class="border-t border-slate-100 my-1"></div>

                                    <button (click)="handleAction('delete', book.id)" class="w-full text-left px-4 py-2 text-sm text-red-600 hover:bg-red-50 flex items-center gap-2">
                                        <span>Excluir Livro</span>
                                    </button>
                                </div>
                            </div>

                            <div (click)="activeMenuId.set(null)" class="fixed inset-0 z-40 bg-transparent cursor-default"></div>
                        }
                    </td>
                </tr>
            }
        </tbody>
    </table>
</div>
