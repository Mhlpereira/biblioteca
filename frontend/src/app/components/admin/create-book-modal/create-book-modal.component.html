<div class="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm p-4 transition-all">
    
    <div class="bg-white rounded-xl shadow-2xl w-full max-w-lg overflow-hidden transform transition-all scale-100">
        
        <div class="bg-slate-50 px-6 py-4 border-b border-slate-100 flex justify-between items-center">
            <h3 class="text-xl font-bold text-slate-800 tracking-tight">Cadastrar Novo Livro</h3>
            <button (click)="close.emit()" class="text-slate-400 hover:text-slate-600 hover:bg-slate-200 rounded-full p-1 transition-colors">
                <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>

        <form [formGroup]="form" (ngSubmit)="submit()" class="p-6">
            <div class="space-y-5">
                
                <div>
                    <label for="title" class="block text-sm font-medium text-slate-700 mb-1">Título do Livro</label>
                    <input 
                        id="title" 
                        type="text" 
                        formControlName="title" 
                        class="w-full px-4 py-2 border border-slate-300 rounded-lg text-slate-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent placeholder-slate-400 transition-all"
                        placeholder="Ex: O Senhor dos Anéis" 
                    />
                </div>

                <div>
                    <label for="author" class="block text-sm font-medium text-slate-700 mb-1">Autor</label>
                    <input 
                        id="author" 
                        type="text" 
                        formControlName="author" 
                        class="w-full px-4 py-2 border border-slate-300 rounded-lg text-slate-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent placeholder-slate-400 transition-all"
                        placeholder="Ex: J.R.R. Tolkien" 
                    />
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                    <div class="sm:col-span-1">
                        <label for="quantity" class="block text-sm font-medium text-slate-700 mb-1">Qtd.</label>
                        <input 
                            id="quantity" 
                            type="number" 
                            formControlName="quantity" 
                            min="1"
                            class="w-full px-4 py-2 border border-slate-300 rounded-lg text-slate-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
                        />
                    </div>

                    <div class="sm:col-span-2">
                        <label for="imageUrl" class="block text-sm font-medium text-slate-700 mb-1">URL da Capa</label>
                        <input 
                            id="imageUrl" 
                            type="text" 
                            formControlName="imageUrl" 
                            class="w-full px-4 py-2 border border-slate-300 rounded-lg text-slate-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent placeholder-slate-400 transition-all"
                            placeholder="https://..." 
                        />
                    </div>
                </div>
            </div>

            <div class="mt-8 flex justify-end gap-3 pt-5 border-t border-slate-100">
                <button 
                    type="button" 
                    (click)="close.emit()" 
                    class="px-5 py-2.5 rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-100 hover:text-slate-800 transition-colors"
                >
                    Cancelar
                </button>
                <button 
                    type="submit" 
                    [disabled]="form.invalid" 
                    class="px-5 py-2.5 rounded-lg text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:ring-4 focus:ring-blue-300 disabled:opacity-50 disabled:cursor-not-allowed transition-all shadow-md hover:shadow-lg"
                >
                    Salvar Livro
                </button>
            </div>
        </form>
    </div>
</div>
