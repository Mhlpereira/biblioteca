<div class="min-h-screen bg-slate-100 flex items-center justify-center px-4 sm:px-6 lg:px-8 py-12">
  
  <div class="max-w-lg w-full bg-white rounded-xl shadow-lg p-8 sm:p-10">
    
    <div class="text-center mb-8">
      <div class="mx-auto h-12 w-12 bg-blue-100 rounded-full flex items-center justify-center mb-4">
        <svg class="h-6 w-6 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z" />
        </svg>
      </div>
      
      <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">
        Crie sua conta
      </h1>
      <p class="mt-2 text-sm text-slate-600">
        Preencha seus dados para acessar a plataforma
      </p>
    </div>

    <app-register-form 
      [isLoading]="isLoading"
      [errorMessage]="errorMessage"
      (registerSubmit)="handleRegister($event)">
    </app-register-form>

    <div class="mt-8 pt-6 border-t border-slate-200 text-center">
      <p class="text-sm text-slate-600">
        Já possui uma conta?
        <a routerLink="/" class="font-semibold text-blue-600 hover:text-blue-500 transition-colors cursor-pointer hover:underline">
          Fazer login
        </a>
      </p>
    </div>

  </div>
</div>
