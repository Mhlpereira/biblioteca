<div class="space-y-6 max-w-4xl mx-auto">
    <h1 class="text-2xl font-bold text-slate-800">Configurações da Conta</h1>

    @if (message.text) {
    <div
        [class]="message.type === 'success' ? 'bg-green-100 text-green-700 border-green-200' : 'bg-red-100 text-red-700 border-red-200'"
        class="p-4 rounded-lg border text-sm font-medium"
    >
        {{ message.text }}
    </div>
    }

    <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
        <h2 class="text-lg font-semibold text-slate-800 mb-4">Dados Pessoais</h2>
        
        <form [formGroup]="profileForm" (ngSubmit)="onUpdateProfile()" class="space-y-4">
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                
                <div>
                    <label class="block text-sm font-medium text-slate-700">Nome</label>
                    <input
                        formControlName="name"
                        type="text"
                        class="mt-1 block w-full px-3 py-2 border border-slate-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm"
                    />
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700">Sobrenome</label>
                    <input
                        formControlName="lastName"
                        type="text"
                        class="mt-1 block w-full px-3 py-2 border border-slate-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm"
                    />
                </div>
            </div>

            <div class="flex justify-end">
                <button
                    type="submit"
                    [disabled]="isLoading"
                    class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-blue-700 disabled:opacity-50"
                >
                    Salvar Alterações
                </button>
            </div>
        </form>
    </div>

    <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
        <h2 class="text-lg font-semibold text-slate-800 mb-4">Alterar Senha</h2>
        <form [formGroup]="passwordForm" (ngSubmit)="onChangePassword()" class="space-y-4">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700">Senha Atual</label>
                    <input
                        formControlName="oldPassword"
                        type="password"
                        class="mt-1 block w-full px-3 py-2 border border-slate-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm"
                    />
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700">Nova Senha</label>
                    <input
                        formControlName="newPassword"
                        type="password"
                        class="mt-1 block w-full px-3 py-2 border border-slate-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm"
                    />
                </div>
            </div>
            <div class="flex justify-end">
                <button
                    type="submit"
                    [disabled]="isLoading"
                    class="bg-slate-800 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-slate-900 disabled:opacity-50"
                >
                    Atualizar Senha
                </button>
            </div>
        </form>
    </div>

    <div class="bg-red-50 p-6 rounded-xl border border-red-100">
        <h2 class="text-lg font-semibold text-red-800 mb-2">Deletar a conta</h2>
        <p class="text-sm text-red-600 mb-4">
            Uma vez que você deletar sua conta, não há como voltar atrás. Por favor, tenha certeza.
        </p>
        <div class="flex justify-end">
            <button
                (click)="onDeleteAccount()"
                [disabled]="isLoading"
                class="bg-red-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-red-700 disabled:opacity-50"
            >
                Deletar Minha Conta
            </button>
        </div>
    </div>
</div>
