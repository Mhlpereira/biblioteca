<div class="min-h-screen bg-gray-50 flex items-center justify-center px-4 sm:px-6 lg:px-8">
  <div class="max-w-md w-full bg-slate-100 rounded-lg shadow-md p-8">
    
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-gray-900">Bem-vindo à Biblioteca</h1>
      <p class="text-gray-600 mt-2">Faça login para acessar sua conta</p>
    </div>

    <app-login-form 
      [isLoading]="isLoading" 
      [errorMessage]="errorMessage"
      (loginSubmit)="handleLogin()">
    </app-login-form>

    <div class="mt-4 text-center">
      <p class="text-sm text-gray-600">
        Não tem conta?
        <a routerLink="/register" class="font-medium text-blue-600 hover:text-blue-500 cursor-pointer">
          Cadastre-se
        </a>
      </p>
    </div>

  </div>
</div>
