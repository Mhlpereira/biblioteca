input {
  kafka {
    bootstrap_servers => "kafka:9092"
    topics => ["reservations"]
    group_id => "logstash-reservations"
    auto_offset_reset => "earliest"
    codec => "json"
    decorate_events => "basic"
  }
}

filter {
  if [value] {
    ruby {
      code => '
        value = event.get("value")
        if value.is_a?(Hash)
          value.each { |k, v| event.set(k, v) }
        end
      '
    }
    mutate { remove_field => ["value"] }
  }

  if [id] {
    mutate { copy => { "id" => "reservation_id" } }
  }

  if [reservedAt] {
    date {
      match => ["reservedAt", "ISO8601"]
      target => "reservedAt"
    }
  }
  if [dueDate] {
    date {
      match => ["dueDate", "ISO8601"]
      target => "dueDate"
    }
  }
  if [returnedAt] {
    date {
      match => ["returnedAt", "ISO8601"]
      target => "returnedAt"
    }
  }
  if [ts] {
    date {
      match => ["ts", "ISO8601"]
      target => "@timestamp"
    }
  } else {
    ruby { code => 'event.set("@timestamp", LogStash::Timestamp.now)' }
  }

  mutate {
    remove_field => ["@version", "event"]
  }
}

output {
  if [action] == "deleted" {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "reservations"
      action => "delete"
      document_id => "%{reservation_id}"
    }
  } else {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "reservations"
      action => "index"
      document_id => "%{reservation_id}"
      template_name => "reservations"
      template => "/usr/share/logstash/templates/reservations-template.json"
      template_overwrite => true
    }
  }

  stdout { codec => rubydebug }
}